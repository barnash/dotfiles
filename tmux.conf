# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'catppuccin/tmux#v2.1.3'

set -g @catppuccin_flavor "mocha"  # or latte, frappe, macchiato
set -g @catppuccin_window_status_style "rounded"

# Make sure window status is visible
set -g status-left "[#S] "
set -g status-right "#{E:@catppuccin_status_session}"

# This is what shows the window list (the middle part)
set -g window-status-current-format "#[bold]#I:#W"
set -g window-status-format "#I:#W"

set -g @catppuccin_window_current_text " #W"
set -g @catppuccin_window_text " #W"


# Initialize TPM (keep at bottom)
run '~/.tmux/plugins/tpm/tpm'

# Mouse integration
set -g mouse on
bind -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'select-pane -t=; copy-mode -e; send-keys -M'"
bind -n WheelDownPane select-pane -t= \; send-keys -M
bind -n C-WheelUpPane select-pane -t= \; copy-mode -e \; send-keys -M

# history limit
set -g history-limit 10000

# Ctrl-B Ctrl-V will round the windwos
unbind ^V
bind ^V select-pane -t :.+

# Reattach each new window to the user bootstrap namespace
# https://github.com/ChrisJohnsen/tmux-MacOSX-pasteboard
set -g default-command "which reattach-to-user-namespace > /dev/null && reattach-to-user-namespace -l $SHELL || $SHELL -l"

# Don't name automatically
set-option -g allow-rename off

# Don't auto-rename based on running command
setw -g automatic-rename off

# Drag-and-drop window reordering in status bar
run '~/.tmux/plugins/tmux-window-drag/window-drag.tmux'

set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @resurrect-save-shell-history 'on'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'
run '~/.tmux/plugins/tpm/tpm'

# Join pane from another window (interactive picker)
bind-key j choose-window "join-pane -s '%%'"

# Send current pane to another window (interactive picker)
bind-key J choose-window "join-pane -t '%%'"

# Or swap by pane number
bind-key S display-panes "swap-pane -t '%%'"

# Move current window left/right (like reordering browser tabs)
bind -n C-S-Left swap-window -d -t -1
bind -n C-S-Right swap-window -d -t +1

# switch panes using Alt-arrow without prefix
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# reload config file (change file location to your the tmux.conf you want to use)
bind r source-file ~/.tmux.conf

###
# Sesh configuration
###
# Don't exit tmux when closing a session (switch to another instead)
set -g detach-on-destroy off

# Skip "kill-pane 1? (y/n)" prompt
bind-key x kill-pane

# Better last-session switching (uses sesh instead of built-in)
bind -N "last-session (via sesh)" l run-shell "sesh last"

# Press prefix + T to open the session picker
bind-key "t" run-shell "sesh connect \"$(
  sesh list --icons | fzf-tmux -p 80%,70% \
    --no-sort --ansi --border-label ' sesh ' --prompt '⚡  ' \
    --header '  ^a all ^t tmux ^g configs ^x zoxide ^d tmux kill ^f find' \
    --bind 'tab:down,btab:up' \
    --bind 'ctrl-a:change-prompt(⚡  )+reload(sesh list --icons)' \
    --bind 'ctrl-t:change-prompt(🪟  )+reload(sesh list -t --icons)' \
    --bind 'ctrl-g:change-prompt(⚙️  )+reload(sesh list -c --icons)' \
    --bind 'ctrl-x:change-prompt(📁  )+reload(sesh list -z --icons)' \
    --bind 'ctrl-f:change-prompt(🔎  )+reload(fd -H -d 2 -t d -E .Trash . ~)' \
    --bind 'ctrl-d:execute(tmux kill-session -t {2..})+change-prompt(⚡  )+reload(sesh list --icons)' \
    --preview-window 'right:55%' \
    --preview 'sesh preview {}'
)\""
